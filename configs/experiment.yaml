# configs/experiment.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TurboRAG KV-Cache Quantization Study – Full Experiment Configuration
# Target hardware: Google Colab T4 (float16 only — NO bfloat16).
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ──────────────────────────────────────────────────────────────────────
model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  use_flash_attn: false
  dtype: "float16"                    # T4 (sm_75) has no native bfloat16

# ── Embedding model (retrieval) ────────────────────────────────────────────────
embedding:
  name: "BAAI/bge-small-en-v1.5"

# ── Chunking parameters ────────────────────────────────────────────────────────
chunking:
  chunk_size:    512
  chunk_overlap: 10

# ── Document collection ────────────────────────────────────────────────────────
# DPR Wikipedia download is DISABLED for the Colab MVE (download_url: "").
# Instead the retrieval corpus is built from the HotpotQA questions' own gold +
# distractor paragraphs (see load_hotpotqa_corpus in chunk_cache.py), so that
# retrieval recall > 0 and the model can actually answer the questions.
wiki_docs:
  download_url: ""                    # empty string disables the DPR TSV download
  num_docs:     0
  save_dir:     "${SCRATCH_DIR}/wiki_dpr_docs"

# ── Storage paths ──────────────────────────────────────────────────────────────
paths:
  kvcache_dir:  "${SCRATCH_DIR}/chunk_kvcache"
  storage_dir:  "${SCRATCH_DIR}/doc_emb"
  output_dir:   "${SCRATCH_DIR}/results"
  analysis_dir: "${SCRATCH_DIR}/analysis"

# ── Retrieval ──────────────────────────────────────────────────────────────────
retrieval:
  # Must be >= max(k_values) so the assert in evaluate.py never fires.
  # Paper-grade runs add k=10, so keep this at 10 even when k_values=[1,3,5].
  similarity_top_k: 10

# ── Experimental conditions ────────────────────────────────────────────────────
conditions:
  - C0    # Gold Oracle RAG (raw text, no precomputed cache)
  - C1    # FP16 TurboRAG
  - C2    # INT8 TurboRAG
  - C3    # INT4 TurboRAG

# ── K values (retrieved chunks) ───────────────────────────────────────────────
k_values: [1, 3, 5]

# ── Datasets ───────────────────────────────────────────────────────────────────
# hf_name / hf_config / hf_split: used to load questions from HuggingFace Hub.
# Set hf_name to null to fall back to query_file (local JSONL).
datasets:
  # NOTE: nq_open requires a retrieval corpus with Wikipedia coverage.
  # The HotpotQA-own-paragraphs corpus (default) has near-zero recall for NQ-Open
  # questions. To enable NQ-Open evaluation:
  #   1. Set wiki_docs.download_url to the DPR TSV URL (psgs_w100.tsv.gz)
  #   2. Set wiki_docs.num_docs to at least 50000 (for meaningful NQ recall)
  #   3. Expect ~80-100GB of disk for 3-precision chunk caches at that scale.
  # Until then, run with mve.datasets: ["hotpotqa"] only.
  nq_open:
    hf_name:        "nq_open"
    hf_config:      null
    hf_split:       "validation"      # nq_open DOES have a validation split
    question_field: "question"
    answer_field:   "answer"
    num_examples:   100
    description:    "Single-hop open-domain QA (tests H1 in controlled setting)"

  hotpotqa:
    hf_name:        "hotpotqa/hotpot_qa"
    hf_config:      "distractor"
    hf_split:       "validation"
    question_field: "question"
    answer_field:   "answer"
    num_examples:   100
    use_provided_context: true        # build corpus from these questions' paragraphs
    description:    "Multi-hop QA (tests H1 and H2, main benchmark for H2)"

  # NOTE: rgb is a local JSONL dataset (not on HF Hub). Place it at
  # questions/rgb.jsonl before including it in mve.datasets.
  # H3 (task-complexity ordering) requires all three datasets to be valid.
  rgb:
    hf_name:        null              # RGB not on standard HF Hub; use local JSONL
    hf_config:      null
    hf_split:       null
    question_field: "question"
    answer_field:   "answer"
    query_file:     "questions/rgb.jsonl"
    num_examples:   100
    description:    "RAG robustness under noisy retrieval (tests H1, H3)"

# ── Minimum Viable Experiment (override above for quick runs) ─────────────────
# num_examples drives BOTH the eval question count AND the chunk-cache corpus
# size (config.py passes it to --hotpotqa_num_examples), so this one number sets
# the whole runtime.  20 is a fast Colab-T4 sanity pass (~10-15 min end-to-end):
# enough to confirm the metrics come out sensible (C0/C1 faithful, C2/C3 worse).
# Bump to 100+ for the real GPU run once the smoke pass looks correct.
mve:
  enabled:      true                  # Colab smoke-check runs in MVE mode
  num_examples: 20
  datasets:     ["hotpotqa"]          # single dataset for the Colab MVE
  k_values:     [1, 3, 5]

# ── Generation ─────────────────────────────────────────────────────────────────
generation:
  max_new_tokens: 64
  do_sample:      false
  temperature:    null

# ── Faithfulness evaluation ────────────────────────────────────────────────────
# HHEM-2.1-Open (~250 MB, flan-t5-base based) and DeBERTa-NLI both fit on a T4.
# With these OFF, hallucination_rate is "N/A" and the whole H1/H2/H3 machinery
# (the point of the study) cannot run — so they are ON.
evaluation:
  eval_hhem: true
  eval_nli:  true
  hhem_model: "vectara/hallucination_evaluation_model"
  nli_model:  "cross-encoder/nli-deberta-v3-large"
  hallucination_threshold: 0.5

# ── Calibration study (Stage 8) ───────────────────────────────────────────────
calibration:
  n_examples: 50
  condition:  "C1"

# ── GPU assignment ────────────────────────────────────────────────────────────
gpu:
  chunk_cache_gpu: 0
  evaluate_gpu:    0                  # Colab T4 has only one GPU (index 0)
