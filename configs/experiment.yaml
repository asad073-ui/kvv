# configs/experiment.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TurboRAG KV-Cache Quantization Study – Full Experiment Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Model ──────────────────────────────────────────────────────────────────────
model:
  name: "Qwen/Qwen2.5-3B-Instruct"   # FIX: was broken scratch path
  use_flash_attn: false
  dtype: "float16"                    # FIX: was bfloat16; T4 prefers float16

# ── Embedding model (retrieval) ────────────────────────────────────────────────
embedding:
  name: "BAAI/bge-small-en-v1.5"

# ── Chunking parameters ────────────────────────────────────────────────────────
chunking:
  chunk_size:    512
  chunk_overlap: 10

# ── Document collection (DPR Wikipedia passages, downloaded from Facebook CDN) ──
# Passages are streamed from the public TSV on the first run and saved to
# wiki_docs.save_dir/wiki_passages.jsonl.  Subsequent runs reload from that file.
# Only the first num_docs rows are downloaded (~1 MB for 100 out of 21M passages).
wiki_docs:
  download_url: "https://dl.fbaipublicfiles.com/dpr/wikipedia_split/psgs_w100.tsv.gz"
  num_docs:     100                   # FIX: was 10000; T4 has 15GB VRAM, keep small
  save_dir:     "${SCRATCH_DIR}/wiki_dpr_docs"

# ── Storage paths ──────────────────────────────────────────────────────────────
paths:
  kvcache_dir:  "${SCRATCH_DIR}/chunk_kvcache"
  storage_dir:  "${SCRATCH_DIR}/doc_emb"
  output_dir:   "${SCRATCH_DIR}/results"    # FIX: was relative; use SCRATCH_DIR
  analysis_dir: "${SCRATCH_DIR}/analysis"   # FIX: was relative; use SCRATCH_DIR

# ── Retrieval ──────────────────────────────────────────────────────────────────
retrieval:
  similarity_top_k: 5   # must be >= max(k_values)

# ── Experimental conditions ────────────────────────────────────────────────────
conditions:
  - C0    # Gold Oracle RAG (raw text, no precomputed cache)
  - C1    # FP16 TurboRAG
  - C2    # INT8 TurboRAG
  - C3    # INT4 TurboRAG

# ── K values (retrieved chunks) ───────────────────────────────────────────────
k_values: [1, 3, 5]

# ── Datasets ───────────────────────────────────────────────────────────────────
# hf_name / hf_config / hf_split: used to load questions from HuggingFace Hub.
# Set hf_name to null to fall back to query_file (local JSONL).
datasets:
  nq_open:
    hf_name:        "nq_open"
    hf_config:      null
    hf_split:       "train"           # FIX: was "validation"; nq_open has no validation split
    question_field: "question"
    answer_field:   "answer"
    num_examples:   50                # FIX: was 200; reduced for T4 memory safety
    description:    "Single-hop open-domain QA (tests H1 in controlled setting)"

  hotpotqa:
    hf_name:        "hotpotqa/hotpot_qa"
    hf_config:      "distractor"
    hf_split:       "validation"
    question_field: "question"
    answer_field:   "answer"
    num_examples:   50                # FIX: was 200; reduced for T4 memory safety
    description:    "Multi-hop QA (tests H1 and H2, main benchmark for H2)"

  rgb:
    hf_name:        null              # RGB not on standard HF Hub; use local JSONL
    hf_config:      null
    hf_split:       null
    question_field: "question"
    answer_field:   "answer"
    query_file:     "questions/rgb.jsonl"
    num_examples:   50                # FIX: was 200; reduced for T4 memory safety
    description:    "RAG robustness under noisy retrieval (tests H1, H3)"
# [https://github.com/chen700564/RGB/blob/master/data/en_refine.json](https://github.com/chen700564/RGB/blob/master/data/en_refine.json)

# ── Minimum Viable Experiment (override above for quick runs) ─────────────────
mve:
  enabled:      true                  # FIX: was false; Colab smoke-check needs MVE on
  num_examples: 5                     # FIX: was 100; 5 examples for fast verification
  datasets:     ["nq_open"]          # FIX: was ["nq_open","hotpotqa"]; single dataset for speed
  k_values:     [1]                   # FIX: was [1,3,5]; k=1 only to reduce VRAM usage

# ── Generation ─────────────────────────────────────────────────────────────────
generation:
  max_new_tokens: 64
  do_sample:      false
  temperature:    null

# ── Faithfulness evaluation ────────────────────────────────────────────────────
evaluation:
  eval_hhem: false                    # FIX: was true; HHEM model too heavy for T4
  eval_nli:  false                    # FIX: was true; NLI model too heavy for T4
  hhem_model: "vectara/hallucination_evaluation_model"
  nli_model:  "cross-encoder/nli-deberta-v3-large"
  hallucination_threshold: 0.5

# ── Calibration study (Stage 8) ───────────────────────────────────────────────
calibration:
  n_examples: 50
  condition:  "C1"

# ── GPU assignment ────────────────────────────────────────────────────────────
gpu:
  chunk_cache_gpu: 0
  evaluate_gpu:    0                  # FIX: was 1; Colab T4 has only 1 GPU (index 0)